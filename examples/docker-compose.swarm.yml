version: "3.9"

services:
    app:
        image: swarmbot/swarmbot:${SWARMBOT_TAG:-latest}
        environment:
            - SWARMBOT_DB=http://${COUCHDB_USER:-admin}:${COUCHDB_PASSWORD:-swarmboty}@db:5984
            - SWARMBOT_INFLUXDB=http://influxdb:8086
            - SWARMBOT_INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
            - SWARMBOT_PORT=8080
            - SWARMBOT_WORK_DIR=/tmp
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
        ports:
            - target: 8080
              published: ${SWARMBOT_PORT:-888}
              protocol: tcp
              mode: ingress
        healthcheck:
            test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
            interval: 60s
            timeout: 10s
            retries: 3
            start_period: 30s
        networks:
            - net
        deploy:
            replicas: 1
            restart_policy:
                condition: on-failure
                delay: 10s
                max_attempts: 3
            update_config:
                parallelism: 1
                delay: 10s
                failure_action: rollback
            placement:
                constraints:
                    - node.role == manager

    db:
        image: couchdb:3
        environment:
            COUCHDB_USER: ${COUCHDB_USER:-admin}
            COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:-swarmboty}
        volumes:
            - db-data:/opt/couchdb/data
        networks:
            - net
        healthcheck:
            test:
                - "CMD-SHELL"
                - >-
                    curl -sf http://$$COUCHDB_USER:$$COUCHDB_PASSWORD@localhost:5984/ &&
                    curl -s -X PUT http://$$COUCHDB_USER:$$COUCHDB_PASSWORD@localhost:5984/_users 2>/dev/null ;
                    curl -s -X PUT http://$$COUCHDB_USER:$$COUCHDB_PASSWORD@localhost:5984/_replicator 2>/dev/null ;
                    curl -s -X PUT http://$$COUCHDB_USER:$$COUCHDB_PASSWORD@localhost:5984/_global_changes 2>/dev/null ;
                    curl -sf http://$$COUCHDB_USER:$$COUCHDB_PASSWORD@localhost:5984/_users
            interval: 10s
            timeout: 5s
            retries: 20
            start_period: 10s
        deploy:
            replicas: 1
            restart_policy:
                condition: on-failure
            update_config:
                parallelism: 1
                delay: 10s
                failure_action: rollback
            placement:
                constraints:
                    - node.role == manager

    influxdb:
        image: influxdb:2.7
        environment:
            DOCKER_INFLUXDB_INIT_MODE: setup
            DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USER:-admin}
            DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD:-swarmboty}
            DOCKER_INFLUXDB_INIT_ORG: swarmbot
            DOCKER_INFLUXDB_INIT_BUCKET: swarmbot
            DOCKER_INFLUXDB_INIT_RETENTION: 0
            DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
        volumes:
            - influx-data:/var/lib/influxdb2
        networks:
            - net
        deploy:
            replicas: 1
            restart_policy:
                condition: on-failure
            update_config:
                parallelism: 1
                delay: 10s
                failure_action: rollback
            placement:
                constraints:
                    - node.role == manager

    agent:
        image: swarmbot/swarmagent:${SWARMAGENT_TAG:-latest}
        environment:
            - DOCKER_API_VERSION=1.44
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
        networks:
            - net
        deploy:
            mode: global
            restart_policy:
                condition: on-failure
                delay: 5s
            update_config:
                parallelism: 1
                delay: 5s
                failure_action: rollback

networks:
    net:
        driver: overlay
        attachable: true

volumes:
    db-data:
        driver: local
    influx-data:
        driver: local
