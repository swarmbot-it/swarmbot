# swarmagent DaemonSet for local dev. Locally-built image (swarmagent:local),
# no GHCR pull secret, no nodeAffinity — so it runs on EVERY k3d node,
# including the one hosting the app (fine for a single-/few-node laptop cluster).
apiVersion: v1
kind: ServiceAccount
metadata:
    name: swarmagent
    namespace: swarmbot
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    name: swarmagent
rules:
    - apiGroups: [""]
      resources: ["nodes"]
      verbs: ["get", "list", "watch"]
    - apiGroups: [""]
      resources: ["nodes/stats", "nodes/proxy"]
      verbs: ["get"]
    - apiGroups: [""]
      resources: ["pods"]
      verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
    name: swarmagent
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: ClusterRole
    name: swarmagent
subjects:
    - kind: ServiceAccount
      name: swarmagent
      namespace: swarmbot
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
    name: swarmagent
    namespace: swarmbot
    labels:
        app.kubernetes.io/name: swarmagent
        app.kubernetes.io/part-of: swarmbot
spec:
    selector:
        matchLabels:
            app.kubernetes.io/name: swarmagent
    updateStrategy:
        type: RollingUpdate
        rollingUpdate:
            maxUnavailable: 1
    template:
        metadata:
            labels:
                app.kubernetes.io/name: swarmagent
        spec:
            serviceAccountName: swarmagent
            # Run on control-plane nodes too (k3d servers are schedulable).
            tolerations:
                - key: node-role.kubernetes.io/control-plane
                  operator: Exists
                  effect: NoSchedule
                - key: node-role.kubernetes.io/master
                  operator: Exists
                  effect: NoSchedule
            securityContext:
                runAsNonRoot: true
                runAsUser: 65534
                runAsGroup: 65534
            containers:
                - name: swarmagent
                  image: swarmagent:local
                  imagePullPolicy: IfNotPresent
                  env:
                      - name: SWARMBOT_URL
                        value: "http://swarmbot.swarmbot.svc.cluster.local:8080"
                      - name: AGENT_MODE
                        value: "kubernetes"
                      - name: NODE_NAME
                        valueFrom:
                            fieldRef:
                                fieldPath: spec.nodeName
                      - name: NODE_IP
                        valueFrom:
                            fieldRef:
                                fieldPath: status.hostIP
                      - name: AGENT_KUBELET_INSECURE_TLS
                        value: "true"
                      - name: STATS_FREQUENCY
                        value: "30"
                  resources:
                      requests:
                          cpu: 10m
                          memory: 16Mi
                      limits:
                          cpu: 200m
                          memory: 64Mi
                  securityContext:
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities:
                          drop: ["ALL"]
