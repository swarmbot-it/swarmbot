# InfluxDB 1.8 (InfluxQL/HTTP auth) for local dev — no node pinning.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: influxdb-data
    namespace: swarmbot
spec:
    accessModes: ["ReadWriteOnce"]
    storageClassName: local-path
    resources:
        requests:
            storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: influxdb
    namespace: swarmbot
    labels:
        app: influxdb
spec:
    replicas: 1
    strategy:
        type: Recreate
    selector:
        matchLabels:
            app: influxdb
    template:
        metadata:
            labels:
                app: influxdb
        spec:
            containers:
                - name: influxdb
                  image: influxdb:1.8
                  env:
                      - name: INFLUXDB_HTTP_AUTH_ENABLED
                        value: "true"
                      - name: INFLUXDB_ADMIN_USER
                        valueFrom:
                            secretKeyRef:
                                name: influxdb-credentials
                                key: INFLUXDB_ADMIN_USER
                      - name: INFLUXDB_ADMIN_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: influxdb-credentials
                                key: INFLUXDB_ADMIN_PASSWORD
                  ports:
                      - containerPort: 8086
                  volumeMounts:
                      - name: data
                        mountPath: /var/lib/influxdb
                  readinessProbe:
                      httpGet:
                          path: /ping
                          port: 8086
                      initialDelaySeconds: 5
                      periodSeconds: 10
            volumes:
                - name: data
                  persistentVolumeClaim:
                      claimName: influxdb-data
---
apiVersion: v1
kind: Service
metadata:
    name: influxdb
    namespace: swarmbot
spec:
    selector:
        app: influxdb
    ports:
        - port: 8086
          targetPort: 8086
