apiVersion: v1
kind: Secret
metadata:
    name: influxdb-credentials
    namespace: sw4rmbot
type: Opaque
stringData:
    DOCKER_INFLUXDB_INIT_MODE: setup
    DOCKER_INFLUXDB_INIT_USERNAME: admin
    DOCKER_INFLUXDB_INIT_PASSWORD: swarmboty
    DOCKER_INFLUXDB_INIT_ORG: sw4rmbot
    DOCKER_INFLUXDB_INIT_BUCKET: sw4rmbot
    DOCKER_INFLUXDB_INIT_RETENTION: "0"
    DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: sw4rmbot-dev-token
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: influxdb-data
    namespace: sw4rmbot
spec:
    accessModes: ["ReadWriteOnce"]
    resources:
        requests:
            storage: 4Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: influxdb
    namespace: sw4rmbot
    labels:
        app: influxdb
spec:
    replicas: 1
    selector:
        matchLabels:
            app: influxdb
    template:
        metadata:
            labels:
                app: influxdb
        spec:
            containers:
                - name: influxdb
                  image: influxdb:2.7
                  envFrom:
                      - secretRef:
                            name: influxdb-credentials
                  ports:
                      - containerPort: 8086
                  volumeMounts:
                      - name: data
                        mountPath: /var/lib/influxdb2
            volumes:
                - name: data
                  persistentVolumeClaim:
                      claimName: influxdb-data
---
apiVersion: v1
kind: Service
metadata:
    name: influxdb
    namespace: sw4rmbot
spec:
    selector:
        app: influxdb
    ports:
        - port: 8086
          targetPort: 8086
