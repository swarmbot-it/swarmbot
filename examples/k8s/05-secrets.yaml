# DEV-ONLY secrets — safe to commit because this whole overlay targets a
# throwaway local k3d cluster. NEVER reuse these values on a real cluster
# (deploy/k3s/05-secrets.yaml keeps CHANGE-ME placeholders for that reason).
apiVersion: v1
kind: Secret
metadata:
    name: postgres-credentials
    namespace: swarmbot
type: Opaque
stringData:
    POSTGRES_USER: swarmbot
    POSTGRES_PASSWORD: swarmbot-dev
    POSTGRES_DB: swarmbot
    SWARMBOT_DB: postgres://swarmbot:swarmbot-dev@db:5432/swarmbot
---
apiVersion: v1
kind: Secret
metadata:
    name: influxdb-credentials
    namespace: swarmbot
type: Opaque
stringData:
    INFLUXDB_ADMIN_USER: swarmbot
    INFLUXDB_ADMIN_PASSWORD: swarmbot-dev
    SWARMBOT_INFLUXDB_TOKEN: swarmbot:swarmbot-dev
---
apiVersion: v1
kind: Secret
metadata:
    name: swarmbot-bootstrap
    namespace: swarmbot
type: Opaque
stringData:
    SWARMBOT_BOOTSTRAP_ADMIN: admin
    SWARMBOT_BOOTSTRAP_PASSWORD: swarmbot
