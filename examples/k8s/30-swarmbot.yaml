apiVersion: v1
kind: ServiceAccount
metadata:
    name: swarmbot
    namespace: swarmbot
---
# Read access to everything the dashboard shows, plus apply rights for the
# "deploy stack" (manifest apply) mutation. Tighten for production.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    name: swarmbot
rules:
    - apiGroups: [""]
      resources:
          - nodes
          - namespaces
          - pods
          - pods/log
          - services
          - persistentvolumeclaims
          - configmaps
          - secrets
      verbs: ["get", "list", "watch"]
    - apiGroups: ["apps"]
      resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
      verbs: ["get", "list", "watch"]
    - apiGroups: [""]
      resources: ["namespaces", "services", "configmaps", "secrets", "persistentvolumeclaims"]
      verbs: ["create", "patch", "update"]
    - apiGroups: ["apps"]
      resources: ["deployments", "statefulsets", "daemonsets"]
      verbs: ["create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
    name: swarmbot
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: ClusterRole
    name: swarmbot
subjects:
    - kind: ServiceAccount
      name: swarmbot
      namespace: swarmbot
---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: swarmbot
    namespace: swarmbot
    labels:
        app: swarmbot
spec:
    replicas: 1
    selector:
        matchLabels:
            app: swarmbot
    template:
        metadata:
            labels:
                app: swarmbot
        spec:
            serviceAccountName: swarmbot
            containers:
                - name: swarmbot
                  image: swarmbot/swarmbot:latest
                  imagePullPolicy: IfNotPresent
                  env:
                      # In-cluster ServiceAccount is auto-detected → kubernetes mode.
                      - name: SWARMBOT_DB
                        value: http://admin:swarmboty@db:5984
                      - name: SWARMBOT_INFLUXDB
                        value: http://influxdb:8086
                      - name: SWARMBOT_INFLUXDB_TOKEN
                        valueFrom:
                            secretKeyRef:
                                name: influxdb-credentials
                                key: DOCKER_INFLUXDB_INIT_ADMIN_TOKEN
                      - name: SWARMBOT_PORT
                        value: "8080"
                  ports:
                      - containerPort: 8080
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: 8080
                      initialDelaySeconds: 5
                      periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
    name: swarmbot
    namespace: swarmbot
spec:
    type: NodePort
    selector:
        app: swarmbot
    ports:
        - port: 8080
          targetPort: 8080
          nodePort: 30880
