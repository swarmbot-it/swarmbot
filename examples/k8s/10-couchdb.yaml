apiVersion: v1
kind: Secret
metadata:
    name: couchdb-credentials
    namespace: swarmbot
type: Opaque
stringData:
    COUCHDB_USER: admin
    COUCHDB_PASSWORD: swarmboty
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: couchdb-data
    namespace: swarmbot
spec:
    accessModes: ["ReadWriteOnce"]
    resources:
        requests:
            storage: 2Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
    name: couchdb
    namespace: swarmbot
    labels:
        app: couchdb
spec:
    serviceName: couchdb
    replicas: 1
    selector:
        matchLabels:
            app: couchdb
    template:
        metadata:
            labels:
                app: couchdb
        spec:
            containers:
                - name: couchdb
                  image: couchdb:3
                  envFrom:
                      - secretRef:
                            name: couchdb-credentials
                  ports:
                      - containerPort: 5984
                  volumeMounts:
                      - name: data
                        mountPath: /opt/couchdb/data
                  readinessProbe:
                      httpGet:
                          path: /
                          port: 5984
                      initialDelaySeconds: 5
                      periodSeconds: 10
            volumes:
                - name: data
                  persistentVolumeClaim:
                      claimName: couchdb-data
---
apiVersion: v1
kind: Service
metadata:
    name: db
    namespace: swarmbot
spec:
    selector:
        app: couchdb
    ports:
        - port: 5984
          targetPort: 5984
