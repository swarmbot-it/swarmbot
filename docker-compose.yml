services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - SWARMBOT_DB=http://db:5984
      - SWARMBOT_INFLUXDB=http://influxdb:8086
      - SWARMBOT_PORT=8080
      - SWARMBOT_WORK_DIR=/tmp
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - 888:8080
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 60s
      timeout: 10s
      retries: 3
    networks:
      - net

  db:
    image: couchdb:2.3.0
    volumes:
      - db-data:/opt/couchdb/data
    networks:
      - net

  influxdb:
    image: influxdb:1.8
    volumes:
      - influx-data:/var/lib/influxdb
    networks:
      - net

  agent:
    image: swarmpit/agent:latest
    environment:
      - DOCKER_API_VERSION=1.44
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - net

networks:
  net:
    driver: bridge

volumes:
  db-data:
    driver: local
  influx-data:
    driver: local

