# OIDC client secret for the Dex "swarmbot" static client, synced from Vault
# (infra/dex/swarmbot) via the cluster-scoped ClusterSecretStore that the Dex
# stack already defines (vault-infra-dex). Apply-time prerequisites:
#   1. no-human-tech/infra PR that adds the `swarmbot` Dex static client.
#   2. Vault secret infra/dex/swarmbot (client_secret) bootstrapped.
#   3. The Vault policy `dex-secrets-read` must permit reading infra/dex/swarmbot.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
    name: swarmbot-oidc
    namespace: swarmbot
    labels:
        app.kubernetes.io/name: swarmbot
        app.kubernetes.io/component: oidc
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: vault-infra-dex
        kind: ClusterSecretStore
    target:
        name: swarmbot-oidc
        creationPolicy: Owner
    data:
        - secretKey: client_secret
          remoteRef:
              key: dex/swarmbot
              property: client_secret
        # PrimeNG (PrimeUI) license key. PrimeNG >= 22 is proprietary and shows an
        # "invalid license" banner without a valid key. Obtain your OWN free
        # Community key at https://primeui.dev and store it in Vault alongside the
        # client secret (property `primeng_license`). Client-visible by design.
        - secretKey: primeng_license
          remoteRef:
              key: dex/swarmbot
              property: primeng_license
