# Swarmbot application (API + UI in one container) — pinned to node k3s-a1,
# image pulled from GHCR. In kubernetes mode the API reads cluster resources
# (nodes/workloads/pods/PVCs/ConfigMaps/Secrets) for the dashboard and applies
# manifests for the "deploy stack" mutation — hence the ServiceAccount + RBAC.
apiVersion: v1
kind: ServiceAccount
metadata:
    name: swarmbot
    namespace: swarmbot
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    name: swarmbot
rules:
    - apiGroups: [""]
      resources:
          - nodes
          - namespaces
          - pods
          - pods/log
          - services
          - persistentvolumeclaims
          - configmaps
          - secrets
      verbs: ["get", "list", "watch"]
    - apiGroups: ["apps"]
      resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
      verbs: ["get", "list", "watch"]
    # "Deploy stack" (manifest apply). Tighten if the feature is not needed.
    - apiGroups: [""]
      resources: ["namespaces", "services", "configmaps", "secrets", "persistentvolumeclaims"]
      verbs: ["create", "patch", "update"]
    - apiGroups: ["apps"]
      resources: ["deployments", "statefulsets", "daemonsets"]
      verbs: ["create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
    name: swarmbot
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: ClusterRole
    name: swarmbot
subjects:
    - kind: ServiceAccount
      name: swarmbot
      namespace: swarmbot
---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: swarmbot
    namespace: swarmbot
    labels:
        app: swarmbot
spec:
    replicas: 1
    selector:
        matchLabels:
            app: swarmbot
    template:
        metadata:
            labels:
                app: swarmbot
        spec:
            serviceAccountName: swarmbot
            nodeSelector:
                kubernetes.io/hostname: k3s-a1.infra.no-human.tech
            imagePullSecrets:
                # Required while the GHCR package is private; see README.md.
                - name: ghcr-pull
            containers:
                - name: swarmbot
                  image: ghcr.io/swarmbot-it/swarmbot:latest
                  imagePullPolicy: Always
                  env:
                      # In-cluster ServiceAccount is auto-detected → kubernetes
                      # mode; keep it explicit for clarity.
                      - name: SWARMBOT_ORCHESTRATOR
                        value: kubernetes
                      - name: SWARMBOT_PORT
                        value: "8080"
                      - name: SWARMBOT_DB
                        valueFrom:
                            secretKeyRef:
                                name: postgres-credentials
                                key: SWARMBOT_DB
                      - name: SWARMBOT_INFLUXDB
                        value: http://influxdb:8086
                      - name: SWARMBOT_INFLUXDB_TOKEN
                        valueFrom:
                            secretKeyRef:
                                name: influxdb-credentials
                                key: SWARMBOT_INFLUXDB_TOKEN
                      # --- OIDC (Dex) login for the internal console ---
                      - name: SWARMBOT_OIDC_ISSUER
                        value: https://dex.no-human.tech
                      - name: SWARMBOT_OIDC_CLIENT_ID
                        value: swarmbot
                      - name: SWARMBOT_OIDC_REDIRECT_URI
                        value: https://swarmbot.infra/api/auth/oidc/callback
                      - name: SWARMBOT_OIDC_CLIENT_SECRET
                        valueFrom:
                            secretKeyRef:
                                name: swarmbot-oidc
                                key: client_secret
                      # GitHub team slugs (Dex emits "no-human-tech:<team>") -> role.
                      # The "utrzymanie" team gets full admin; everyone else in the
                      # org is read-only (role "user" — no editor tier).
                      - name: SWARMBOT_OIDC_ADMIN_GROUPS
                        value: "no-human-tech:utrzymanie"
                      - name: SWARMBOT_OIDC_EDITOR_GROUPS
                        value: ""
                      # "/" on this host redirects straight to Dex (skip the public landing).
                      - name: SWARMBOT_CONSOLE_HOSTS
                        value: swarmbot.infra
                      # Uncomment once the agent supports the shared secret
                      # (swarmagent PR "agent-shared-secret-auth"); the agent
                      # must send the same value in the x-agent-token header.
                      # - name: SWARMAGENT_SHARED_SECRET
                      #   valueFrom:
                      #       secretKeyRef:
                      #           name: swarmbot-agent
                      #           key: SWARMAGENT_SHARED_SECRET
                  envFrom:
                      - secretRef:
                            name: swarmbot-bootstrap
                  ports:
                      - containerPort: 8080
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: 8080
                      initialDelaySeconds: 5
                      periodSeconds: 10
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: 8080
                      initialDelaySeconds: 30
                      periodSeconds: 30
                  resources:
                      requests:
                          cpu: 100m
                          memory: 256Mi
                      limits:
                          memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
    name: swarmbot
    namespace: swarmbot
spec:
    type: ClusterIP
    selector:
        app: swarmbot
    ports:
        - port: 8080
          targetPort: 8080
