# CHANGE ALL VALUES BEFORE APPLYING TO A REAL CLUSTER.
# Alternatively create these secrets out-of-band (kubectl create secret / SealedSecrets)
# and remove this file from kustomization.yaml.
apiVersion: v1
kind: Secret
metadata:
    name: postgres-credentials
    namespace: swarmboty
type: Opaque
stringData:
    POSTGRES_USER: swarmboty
    POSTGRES_PASSWORD: CHANGE-ME-postgres
    POSTGRES_DB: swarmboty
    # Full connection string consumed by the app (SWARMBOTY_DB).
    # Keep user/password/db in sync with the three keys above.
    SWARMBOTY_DB: postgres://swarmboty:CHANGE-ME-postgres@db:5432/swarmboty
---
apiVersion: v1
kind: Secret
metadata:
    name: influxdb-credentials
    namespace: swarmboty
type: Opaque
stringData:
    INFLUXDB_ADMIN_USER: swarmboty
    INFLUXDB_ADMIN_PASSWORD: CHANGE-ME-influxdb
    # InfluxDB 1.8 accepts "Authorization: Token <user>:<password>", which is
    # exactly what the app sends (SWARMBOTY_INFLUXDB_TOKEN).
    SWARMBOTY_INFLUXDB_TOKEN: swarmboty:CHANGE-ME-influxdb
---
# First-run application admin account (created only when the users table is
# empty; see apps/api/src/users/bootstrap.ts).
apiVersion: v1
kind: Secret
metadata:
    name: swarmboty-bootstrap
    namespace: swarmboty
type: Opaque
stringData:
    SWARMBOTY_BOOTSTRAP_ADMIN: admin
    SWARMBOTY_BOOTSTRAP_PASSWORD: CHANGE-ME-app-admin
