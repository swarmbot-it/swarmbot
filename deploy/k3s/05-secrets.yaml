# CHANGE ALL VALUES BEFORE APPLYING TO A REAL CLUSTER.
# Alternatively create these secrets out-of-band (kubectl create secret / SealedSecrets)
# and remove this file from kustomization.yaml.
apiVersion: v1
kind: Secret
metadata:
    name: postgres-credentials
    namespace: swarmbot
type: Opaque
stringData:
    POSTGRES_USER: swarmbot
    POSTGRES_PASSWORD: CHANGE-ME-postgres
    POSTGRES_DB: swarmbot
    # Full connection string consumed by the app (SWARMBOT_DB).
    # Keep user/password/db in sync with the three keys above.
    SWARMBOT_DB: postgres://swarmbot:CHANGE-ME-postgres@db:5432/swarmbot
---
apiVersion: v1
kind: Secret
metadata:
    name: influxdb-credentials
    namespace: swarmbot
type: Opaque
stringData:
    INFLUXDB_ADMIN_USER: swarmbot
    INFLUXDB_ADMIN_PASSWORD: CHANGE-ME-influxdb
    # InfluxDB 1.8 accepts "Authorization: Token <user>:<password>", which is
    # exactly what the app sends (SWARMBOT_INFLUXDB_TOKEN).
    SWARMBOT_INFLUXDB_TOKEN: swarmbot:CHANGE-ME-influxdb
---
# First-run application admin account (created only when the users table is
# empty; see apps/api/src/users/bootstrap.ts).
apiVersion: v1
kind: Secret
metadata:
    name: swarmbot-bootstrap
    namespace: swarmbot
type: Opaque
stringData:
    SWARMBOT_BOOTSTRAP_ADMIN: admin
    SWARMBOT_BOOTSTRAP_PASSWORD: CHANGE-ME-app-admin
