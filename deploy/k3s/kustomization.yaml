apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
    - 00-namespace.yaml
    - 05-secrets.yaml
    - 10-postgres.yaml
    - 20-influxdb.yaml
    - 30-swarmboty.yaml
    - 40-swarmagent.yaml
    - 50-ingress.yaml

# Pin image tags for a release, e.g.:
#   kustomize edit set image ghcr.io/swarmbot-it/swarmbot=ghcr.io/swarmbot-it/swarmbot:0.2.0
images:
    - name: ghcr.io/swarmbot-it/swarmbot
      newTag: latest
    - name: ghcr.io/swarmbot-it/swarmagent
      newTag: latest
