# docker-compose.dev.yml — Local development stack for swarmbot.it
#
# ── Quick start ──────────────────────────────────────────────────────────────
#
#   Full stack (real databases):
#     docker compose -f docker-compose.dev.yml up
#
#   Mock mode (no real Docker socket or databases needed):
#     SWARMBOT_MOCK=true docker compose -f docker-compose.dev.yml up api web
#
#   The Rust agent (built from source) starts automatically with the full
#   stack and pushes host CPU/Memory/Disk telemetry to the API.
#
# ── Endpoints ────────────────────────────────────────────────────────────────
#
#   http://localhost:4200          Angular dev server  (HMR / live-reload)
#   http://localhost:8080/graphql  GraphQL API          (tsx hot-reload)
#   http://localhost:8080/health   API health
#   localhost:5432                 Postgres (psql/pgAdmin — no bundled admin UI)
#   http://localhost:8086          InfluxDB HTTP API
#
# ── Default credentials (bootstrap / mock) ────────────────────────────────
#
#   user: admin   password: swarmbot
#
# ── Windows tip ───────────────────────────────────────────────────────────
#
#   Angular HMR inside Docker uses filesystem polling (--poll 500), which is
#   slower than running the dev server on the host.  For the best experience
#   keep only databases + API in Docker and run the Angular server locally:
#
#     # terminal 1 (databases + API in Docker):
#     docker compose -f docker-compose.dev.yml up db influxdb api
#
#     # terminal 2 (Angular on host, proxy already points at localhost:8080):
#     npm run dev:web

services:
    # ── Postgres ──────────────────────────────────────────────────────────────

    db:
        image: postgres:16-alpine
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-admin}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swarmbot}
            POSTGRES_DB: ${POSTGRES_DB:-swarmbot}
        ports:
            - "5432:5432"
        volumes:
            - db-data:/var/lib/postgresql/data
        networks:
            - net
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
            interval: 5s
            timeout: 5s
            retries: 20
            start_period: 5s

    # ── InfluxDB ──────────────────────────────────────────────────────────────

    influxdb:
        image: influxdb:2.7
        environment:
            DOCKER_INFLUXDB_INIT_MODE: setup
            DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USER:-admin}
            DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD:-swarmbot}
            DOCKER_INFLUXDB_INIT_ORG: swarmbot
            DOCKER_INFLUXDB_INIT_BUCKET: swarmbot
            DOCKER_INFLUXDB_INIT_RETENTION: 0
            DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN:-swarmbot-influx-dev-token}
        ports:
            - "8086:8086" # HTTP API
        volumes:
            - influx-data:/var/lib/influxdb2
        networks:
            - net
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "wget", "-qO-", "http://localhost:8086/health"]
            interval: 8s
            timeout: 5s
            retries: 15
            start_period: 10s

    # ── API — Node.js with tsx hot-reload ─────────────────────────────────────
    #
    # Source is mounted into the container; tsx (node --watch --import tsx)
    # restarts the process on every .ts change.
    #
    # depends_on uses required: false so that running
    #   SWARMBOT_MOCK=true docker compose up api web
    # skips the database health checks and starts immediately.

    api:
        image: node:24-alpine
        working_dir: /app
        command: ["sh", "-c", "apk add --no-cache docker-cli && npm install --prefer-offline --no-progress --no-audit && npm run dev -w @swarmbot/api"]
        environment:
            NODE_ENV: development
            # tsx watch uses chokidar under the hood; native fs events are unreliable over
            # Windows-hosted bind mounts, so force polling (mirrors the web service's --poll 500).
            CHOKIDAR_USEPOLLING: "true"
            CHOKIDAR_INTERVAL: "500"
            SWARMBOT_DB: postgres://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-swarmbot}@db:5432/${POSTGRES_DB:-swarmbot}
            SWARMBOT_INFLUXDB: http://influxdb:8086
            SWARMBOT_INFLUXDB_TOKEN: ${INFLUXDB_TOKEN:-swarmbot-influx-dev-token}
            SWARMBOT_PORT: "8080"
            SWARMBOT_WORK_DIR: /tmp
            SWARMBOT_MOCK: ${SWARMBOT_MOCK:-false}
            SWARMBOT_BOOTSTRAP_ADMIN: ${SWARMBOT_BOOTSTRAP_ADMIN:-admin}
            SWARMBOT_BOOTSTRAP_PASSWORD: ${SWARMBOT_BOOTSTRAP_PASSWORD:-swarmbot}
        volumes:
            - .:/app # full workspace — enables hot-reload
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - api-nm:/app/node_modules # isolated container node_modules
        ports:
            - "8080:8080"
        depends_on:
            db:
                condition: service_healthy
                required: false # optional — skipped in mock mode
            influxdb:
                condition: service_healthy
                required: false
        networks:
            - net
        restart: unless-stopped

    # ── Angular dev server ────────────────────────────────────────────────────
    #
    # Uses proxy.conf.docker.json (target: http://api:8080) instead of the
    # default proxy.conf.json (target: http://localhost:8080).
    # --poll 500 enables reliable file watching on Windows bind mounts.

    web:
        image: node:24-alpine
        working_dir: /app
        command: ["sh", "-c", "npm install --prefer-offline --no-progress --no-audit && npm install @rollup/rollup-linux-x64-musl --no-save --no-audit --no-fund && cd apps/web && npx ng serve --host 0.0.0.0 --port 4200 --poll 500 --proxy-config proxy.conf.docker.json"]
        environment:
            NODE_ENV: development
        volumes:
            - .:/app
            - web-nm:/app/node_modules
        ports:
            - "4200:4200"
        depends_on:
            - api
        networks:
            - net
        restart: unless-stopped

    # ── Swarmagent — host CPU/Memory/Disk telemetry collector ─────────────────
    #
    # Vendored as a git submodule (./swarmagent) so a plain
    # `git clone --recurse-submodules` gets everything needed to build it.
    # Starts automatically with the rest of the stack.

    agent:
        build:
            context: ./swarmagent
            dockerfile: Dockerfile
        user: "0:0"
        environment:
            EVENT_ENDPOINT: http://api:8080/events
            HEALTH_CHECK_ENDPOINT: http://api:8080/version
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
        depends_on:
            - api
        networks:
            - net
        restart: unless-stopped

networks:
    net:
        driver: bridge

volumes:
    db-data:
    influx-data:
    api-nm: # persistent node_modules for API container (survives restarts)
    web-nm: # persistent node_modules for Angular container
