<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>SW4RMBOT.IT — Intelligent Docker Swarm Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:#060a14;color:#f1f5f9;line-height:1.5;overflow-x:hidden;
}
a{color:#fb923c}a:hover{color:#f97316}

/* ── KEYFRAMES ── */
@keyframes pulse-glow{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes terminal-blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes fade-in-up{0%{opacity:0;transform:translateY(32px)}100%{opacity:1;transform:translateY(0)}}
@keyframes node-pulse-o{0%,100%{box-shadow:0 0 20px rgba(249,115,22,.15),inset 0 0 20px rgba(249,115,22,.05)}50%{box-shadow:0 0 32px rgba(249,115,22,.3),inset 0 0 30px rgba(249,115,22,.1)}}
@keyframes node-pulse-g{0%,100%{box-shadow:0 0 20px rgba(16,185,129,.15),inset 0 0 20px rgba(16,185,129,.05)}50%{box-shadow:0 0 32px rgba(16,185,129,.3),inset 0 0 30px rgba(16,185,129,.1)}}
@keyframes node-die{0%{box-shadow:0 0 32px rgba(239,68,68,.5)}100%{box-shadow:0 0 0 rgba(239,68,68,0);opacity:.4}}
@keyframes hero-gradient{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@media(prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}

/* ── LAYOUT ── */
.container{max-width:1280px;margin:0 auto;padding:0 48px}
@media(max-width:860px){.container{padding:0 20px}}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;height:72px;
  background:rgba(6,10,20,.85);backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(249,115,22,.08);
}
nav .container{height:100%;display:flex;align-items:center;justify-content:space-between;gap:16px}
.brand{display:flex;align-items:center;gap:14px;text-decoration:none;flex-shrink:0}
.brand-name{font-size:17px;font-weight:800;letter-spacing:-.02em;color:#f1f5f9}
.brand-name span{color:#fb923c}
.nav-links{display:flex;gap:2px;list-style:none}
.nav-links a{
  display:block;padding:7px 14px;color:#94a3b8;text-decoration:none;
  font-size:13px;font-weight:500;border-radius:8px;
  transition:color .15s,background .15s;white-space:nowrap;
}
.nav-links a:hover{color:#f1f5f9;background:rgba(255,255,255,.04)}
.nav-right{display:flex;align-items:center;gap:10px;flex-shrink:0}

/* Language switcher */
.lang-sw{
  display:flex;align-items:center;border-radius:8px;
  border:1px solid rgba(249,115,22,.15);background:rgba(249,115,22,.04);
  overflow:hidden;font-family:'JetBrains Mono',monospace;font-size:11px;
  letter-spacing:.06em;font-weight:600;
}
.lang-btn{
  padding:6px 12px;border:none;cursor:pointer;transition:all .2s;
  background:transparent;color:#64748b;display:flex;align-items:center;gap:5px;
}
.lang-btn.active{background:rgba(249,115,22,.15);color:#f97316}
.lang-sep{width:1px;height:16px;background:rgba(249,115,22,.12)}

.btn-login{
  font-size:13px;font-weight:500;color:#cbd5e1;cursor:pointer;white-space:nowrap;
  text-decoration:none;padding:7px 14px;border-radius:8px;border:none;background:transparent;
  transition:color .15s;
}
.btn-login:hover{color:#f1f5f9}
.btn-cta{
  padding:8px 18px;background:linear-gradient(135deg,#f97316,#ea580c);
  border-radius:10px;font-size:13px;font-weight:700;color:white;cursor:pointer;
  text-decoration:none;border:none;display:inline-flex;align-items:center;gap:8px;
  transition:transform .2s,box-shadow .2s;white-space:nowrap;
}
.btn-cta:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(249,115,22,.35);color:white}

/* ── HERO ── */
.hero{
  min-height:100vh;padding:140px 0 80px;position:relative;overflow:hidden;
}
.hero-orb{position:absolute;border-radius:50%;pointer-events:none}
.hero-orb-1{top:-200px;left:-200px;width:700px;height:700px;background:radial-gradient(circle,rgba(249,115,22,.05) 0%,transparent 65%)}
.hero-orb-2{bottom:-100px;right:-100px;width:600px;height:600px;background:radial-gradient(circle,rgba(251,146,60,.04) 0%,transparent 65%)}
.hero .container{
  display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:48px;align-items:center;
  position:relative;z-index:1;
}
@media(max-width:860px){.hero .container{grid-template-columns:1fr}}

.hero-badge{
  display:inline-flex;align-items:center;gap:8px;padding:6px 16px;
  border-radius:999px;border:1px solid rgba(249,115,22,.2);background:rgba(249,115,22,.06);
  margin-bottom:28px;
}
.badge-dot{
  width:7px;height:7px;border-radius:50%;background:#10b981;
  box-shadow:0 0 8px rgba(16,185,129,.5);animation:pulse-glow 2s infinite;
}
.badge-txt{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.1em;color:#f97316;text-transform:uppercase}

h1{font-size:clamp(34px,4vw,52px);font-weight:800;letter-spacing:-.035em;line-height:1.1;margin-bottom:24px}
.h1-white{
  background:linear-gradient(135deg,#f1f5f9 0%,#cbd5e1 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:block;
}
.h1-orange{
  background:linear-gradient(135deg,#fdba74 0%,#f97316 40%,#ea580c 100%);
  background-size:200% 200%;animation:hero-gradient 6s ease infinite;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:block;
}
.hero-desc{font-size:17px;color:#94a3b8;line-height:1.65;max-width:480px;margin-bottom:36px}
.hero-btns{display:flex;gap:16px;align-items:center;margin-bottom:32px;flex-wrap:wrap}
.btn-primary{
  padding:14px 32px;background:linear-gradient(135deg,#f97316,#ea580c);
  border-radius:12px;font-size:16px;font-weight:700;color:white;cursor:pointer;
  text-decoration:none;border:none;display:inline-flex;align-items:center;gap:10px;
  transition:transform .2s,box-shadow .2s;
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(249,115,22,.4);color:white}
.btn-secondary{
  padding:14px 32px;border:1px solid #232d49;border-radius:12px;
  font-size:16px;font-weight:600;color:#cbd5e1;cursor:pointer;
  text-decoration:none;background:rgba(255,255,255,.02);
  display:inline-flex;align-items:center;gap:10px;
  transition:border-color .2s,color .2s,background .2s;
}
.btn-secondary:hover{border-color:#f97316;color:#f1f5f9;background:rgba(249,115,22,.05)}
.hero-checks{display:flex;gap:28px;font-size:13px;color:#64748b;flex-wrap:wrap}
.hero-check{display:flex;align-items:center;gap:8px}
.check-ok{color:#10b981;font-size:14px}

/* ── DEMO WIDGET ── */
.demo-widget{
  background:rgba(255,255,255,.02);border:1px solid rgba(249,115,22,.12);
  border-radius:20px;padding:20px;overflow:hidden;
  box-shadow:0 0 60px rgba(249,115,22,.03),0 0 1px rgba(249,115,22,.15);
}
.demo-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.demo-title-row{display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;color:#64748b;text-transform:uppercase}
.demo-status{display:flex;align-items:center;gap:6px;font-size:12px;font-family:'JetBrains Mono',monospace}

.nodes-row{display:flex;gap:10px;margin-bottom:14px}
.node-card{
  flex:1;min-width:0;padding:16px 12px;border-radius:14px;
  border:1px solid rgba(249,115,22,.2);background:rgba(249,115,22,.08);
  transition:all .4s ease;animation:node-pulse-o 2.5s ease infinite;
  display:flex;flex-direction:column;align-items:center;gap:10px;
}
.node-card.dead{background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.2);animation:node-die .8s ease forwards;opacity:.4}
.node-card.boosted{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.4);animation:node-pulse-g 1.5s ease infinite}
.node-icon{width:36px;height:36px;border-radius:10px;background:rgba(249,115,22,.12);display:flex;align-items:center;justify-content:center;font-size:16px}
.node-card.dead .node-icon{background:rgba(239,68,68,.15)}
.node-card.boosted .node-icon{background:rgba(16,185,129,.15)}
.node-lbl{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:#f97316}
.node-card.dead .node-lbl{color:#ef4444}
.node-card.boosted .node-lbl{color:#10b981}
.node-load{font-family:'JetBrains Mono',monospace;font-size:11px;color:#64748b}
.node-badge{font-size:10px;font-family:'JetBrains Mono',monospace;color:#10b981;background:rgba(16,185,129,.1);padding:2px 8px;border-radius:6px;display:flex;align-items:center;gap:4px}

.demo-btns{display:flex;gap:6px;margin-bottom:16px}
.kill-btn{
  flex:1;padding:9px 8px;border-radius:10px;border:1px solid rgba(239,68,68,.3);
  background:rgba(239,68,68,.08);color:#ef4444;font-family:'JetBrains Mono',monospace;
  font-size:10px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.03em;
}
.kill-btn:disabled{border-color:rgba(100,116,139,.15);background:rgba(100,116,139,.05);color:#334155;cursor:not-allowed}
.kill-btn:not(:disabled):hover{background:rgba(239,68,68,.14)}
.reset-btn{
  padding:9px 12px;border-radius:10px;border:1px solid rgba(249,115,22,.25);
  background:rgba(249,115,22,.08);color:#f97316;font-family:'JetBrains Mono',monospace;
  font-size:10px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.03em;
}
.reset-btn:disabled{opacity:.45;cursor:not-allowed}
.reset-btn:not(:disabled):hover{background:rgba(249,115,22,.14)}

.terminal{background:#0a0e1a;border:1px solid rgba(249,115,22,.08);border-radius:12px;overflow:hidden}
.term-head{padding:10px 14px;background:#0e1224;border-bottom:1px solid rgba(249,115,22,.06);display:flex;align-items:center;gap:10px}
.term-dots{display:flex;gap:6px}
.tdot{width:10px;height:10px;border-radius:50%}
.term-name{font-family:'JetBrains Mono',monospace;font-size:11px;color:#475569;margin-left:4px}
.term-body{padding:12px 14px;max-height:150px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.term-body::-webkit-scrollbar{width:3px}
.term-body::-webkit-scrollbar-thumb{background:rgba(249,115,22,.2);border-radius:2px}
.ll{font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.7;animation:fade-in-up .3s ease}
.ll-info{color:#3b82f6}.ll-ok{color:#10b981}.ll-warn{color:#f59e0b}.ll-err{color:#ef4444}
.term-cursor{font-family:'JetBrains Mono',monospace;font-size:11px;color:#f97316;display:flex;align-items:center;gap:4px;margin-top:2px}
.cursor-block{width:7px;height:14px;background:#f97316;animation:terminal-blink 1s step-end infinite;display:inline-block}

/* ── DIVIDER ── */
.section-divider{height:1px;max-width:800px;margin:0 auto;background:linear-gradient(90deg,transparent 0%,rgba(249,115,22,.2) 50%,transparent 100%)}

/* ── FEATURES ── */
.features{padding:120px 0}
.sec-head{text-align:center;margin-bottom:64px}
.sec-label{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.15em;color:#f97316;text-transform:uppercase;margin-bottom:16px}
.sec-title{font-size:clamp(28px,3.5vw,44px);font-weight:800;letter-spacing:-.03em;margin-bottom:16px;color:#f1f5f9;text-wrap:balance}
.sec-desc{font-size:17px;color:#64748b;max-width:560px;margin:0 auto;line-height:1.6}
.feat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
@media(max-width:900px){.feat-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:580px){.feat-grid{grid-template-columns:1fr}}
.feat-card{
  padding:32px 28px;border-radius:16px;
  background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);
  transition:transform .2s,background .25s,border-color .25s,box-shadow .25s;
  cursor:default;position:relative;overflow:hidden;
}
.feat-card:hover{transform:translateY(-2px);background:rgba(255,255,255,.04);box-shadow:0 20px 48px rgba(0,0,0,.35)}
.feat-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:20px}
.feat-title{font-size:18px;font-weight:700;color:#f1f5f9;margin-bottom:10px;letter-spacing:-.01em}
.feat-desc{font-size:14px;color:#64748b;line-height:1.6}

/* ── HOW IT WORKS ── */
.how{padding:120px 0}
.how-steps{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid rgba(249,115,22,.08);border-radius:20px;overflow:hidden;margin-top:64px}
@media(max-width:768px){.how-steps{grid-template-columns:1fr}}
.how-step{padding:40px 34px;position:relative}
.how-step:not(:last-child){border-right:1px solid rgba(249,115,22,.08)}
@media(max-width:768px){.how-step:not(:last-child){border-right:none;border-bottom:1px solid rgba(249,115,22,.08)}}
.how-num{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.12em;color:#f97316;margin-bottom:16px}
.how-icon{width:52px;height:52px;border-radius:14px;border:1px solid rgba(249,115,22,.12);background:rgba(249,115,22,.06);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:18px}
.how-title{font-size:19px;font-weight:700;color:#f1f5f9;margin-bottom:11px}
.how-desc{font-size:14px;color:#94a3b8;line-height:1.65}

/* ── DOCS SECTION ── */
.docs-sec{padding:120px 0}
.doc-tabs{display:flex;gap:4px;margin-bottom:36px;background:rgba(255,255,255,.03);border-radius:14px;padding:4px;border:1px solid rgba(249,115,22,.08)}
.doc-tab{
  flex:1;padding:14px 20px;border-radius:10px;border:none;
  background:transparent;color:#64748b;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;
  transition:all .25s;
}
.doc-tab.active{background:rgba(249,115,22,.1);color:#f97316;box-shadow:0 0 20px rgba(249,115,22,.08)}
.doc-grid{display:grid;grid-template-columns:1fr 1fr;gap:32px;align-items:start}
@media(max-width:768px){.doc-grid{grid-template-columns:1fr}}
.doc-heading{font-size:28px;font-weight:700;color:#f1f5f9;margin-bottom:20px;letter-spacing:-.02em}
.doc-text{font-size:15px;color:#94a3b8;line-height:1.7;margin-bottom:16px}
.code-block{background:#0a0e1a;border:1px solid rgba(249,115,22,.08);border-radius:14px;overflow:hidden;position:relative}
.code-head{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#0e1224;border-bottom:1px solid rgba(249,115,22,.06)}
.code-lang{font-family:'JetBrains Mono',monospace;font-size:11px;color:#475569}
.copy-btn{
  display:flex;align-items:center;gap:6px;padding:4px 12px;border-radius:6px;
  border:1px solid rgba(249,115,22,.2);background:rgba(249,115,22,.06);color:#f97316;
  font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;transition:all .2s;
}
.copy-btn.copied{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.1);color:#10b981}
.code-body{padding:16px;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.7;color:#94a3b8;overflow-x:auto;white-space:pre}
.doc-cta-row{text-align:center;margin-top:48px}
.doc-cta-note{font-size:15px;color:#64748b;margin-bottom:20px}

/* ── CTA ── */
.cta{padding:120px 0;position:relative;overflow:hidden}
.cta-bg{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 0%,rgba(249,115,22,.06) 0%,transparent 60%)}
.cta-inner{max-width:720px;margin:0 auto;text-align:center;position:relative;z-index:1}
.cta-title{font-size:clamp(32px,4vw,48px);font-weight:800;letter-spacing:-.03em;margin-bottom:20px;color:#f1f5f9;text-wrap:balance}
.cta-desc{font-size:18px;color:#64748b;line-height:1.6;margin-bottom:40px}
.cta-btns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.btn-cta-lg{padding:16px 40px;border-radius:12px;font-size:17px;font-weight:700;display:inline-flex;align-items:center;gap:10px;text-decoration:none;cursor:pointer;border:none;transition:all .2s}
.btn-cta-orange{background:linear-gradient(135deg,#f97316,#ea580c);color:white}
.btn-cta-orange:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(249,115,22,.4);color:white}
.btn-cta-ghost{background:rgba(255,255,255,.02);border:1px solid #232d49;color:#cbd5e1}
.btn-cta-ghost:hover{border-color:#f97316;color:#f1f5f9}

/* ── FOOTER ── */
footer{border-top:1px solid rgba(249,115,22,.08);padding:48px 0}
footer .container{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.foot-brand{display:flex;align-items:center;gap:12px}
.foot-name{font-weight:800;font-size:14px;letter-spacing:-.02em;color:#94a3b8}
.foot-name span{color:#fb923c}
.foot-copy{font-family:'JetBrains Mono',monospace;font-size:12px;color:#334155}
</style>
</head>
<body>

<!-- ══ NAVBAR ══ -->
<nav>
  <div class="container">
    <a href="/" class="brand">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <line x1="12" y1="16" x2="15.7" y2="9.4" stroke="#FB923C" stroke-width="1.2" stroke-linecap="round" opacity=".7"/>
        <line x1="12" y1="16" x2="15.7" y2="22.6" stroke="#FB923C" stroke-width="1.2" stroke-linecap="round" opacity=".7"/>
        <line x1="20.3" y1="9.4" x2="23" y2="14" stroke="#FB923C" stroke-width="1.2" stroke-linecap="round" opacity=".7"/>
        <line x1="20.3" y1="22.6" x2="23" y2="18" stroke="#FB923C" stroke-width="1.2" stroke-linecap="round" opacity=".7"/>
        <circle cx="9" cy="16" r="3.4" fill="#FB923C"/>
        <circle cx="18" cy="9" r="2.4" fill="#FDBA74"/>
        <circle cx="18" cy="23" r="2.4" fill="#FDBA74"/>
        <circle cx="25" cy="16" r="2.8" fill="#F97316"/>
      </svg>
      <span class="brand-name">SW4RMBOT<span>.IT</span></span>
    </a>

    <ul class="nav-links" id="nav-links">
      <li><a href="#features" data-i18n="navFeatures"></a></li>
      <li><a href="#how" data-i18n="navHow"></a></li>
      <li><a href="/docs" data-i18n="navDocs"></a></li>
    </ul>

    <div class="nav-right">
      <!-- PL / EN switcher -->
      <div class="lang-sw" role="group" aria-label="Language">
        <button class="lang-btn active" id="lang-pl" onclick="setLang('pl')" aria-pressed="true">
          <i class="fa-solid fa-globe" style="font-size:10px"></i> PL
        </button>
        <div class="lang-sep"></div>
        <button class="lang-btn" id="lang-en" onclick="setLang('en')" aria-pressed="false">EN</button>
      </div>
      <a href="/app" class="btn-login" id="nav-login" data-i18n="navLogin"></a>
      <a href="#demo" class="btn-cta" id="nav-cta" data-i18n="navCta"></a>
    </div>
  </div>
</nav>

<!-- ══ HERO ══ -->
<section class="hero">
  <div class="hero-orb hero-orb-1"></div>
  <div class="hero-orb hero-orb-2"></div>
  <div class="container">

    <!-- Left -->
    <div>
      <div class="hero-badge">
        <div class="badge-dot"></div>
        <span class="badge-txt" data-i18n="heroBadge"></span>
      </div>
      <h1>
        <span class="h1-white" data-i18n="heroLine1"></span>
        <span class="h1-orange">Zero Downtime.</span>
      </h1>
      <p class="hero-desc" data-i18n="heroDesc"></p>
      <div class="hero-btns">
        <a href="/app" class="btn-primary">
          <span data-i18n="heroCtaLogin"></span>
          <i class="fa-solid fa-arrow-right"></i>
        </a>
        <a href="#demo" class="btn-secondary">
          <i class="fa-solid fa-play" style="font-size:14px"></i>
          <span data-i18n="heroCtaDemo"></span>
        </a>
      </div>
      <div class="hero-checks">
        <div class="hero-check">
          <i class="fa-solid fa-check check-ok"></i>

let LANG = 'pl';

function t(key, vars) {
  const entry = STRINGS[key];
  if (!entry) return key;
  let s = entry[LANG] || entry['en'] || key;
  if (vars) Object.keys(vars).forEach(k => s = s.replace(new RegExp('{'+k+'}','g'), vars[k]));
  return s;
}

function setLang(lang) {
  LANG = lang;
  document.documentElement.lang = lang;
  document.getElementById('lang-pl').classList.toggle('active', lang === 'pl');
  document.getElementById('lang-en').classList.toggle('active', lang === 'en');
  document.getElementById('lang-pl').setAttribute('aria-pressed', lang === 'pl');
  document.getElementById('lang-en').setAttribute('aria-pressed', lang === 'en');
  applyI18n();
  renderFeatures();
  renderHowSteps();
  renderDocTabs();
  renderDocContent(activeDocTab);
  renderWidgets();
}

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.getAttribute('data-i18n'));
  });
}

function renderDocTabs() {

    <button class="doc-tab${activeDocTab===i?' active':''}" onclick="switchDocTab(${i})">${t('docTab'+i)}</button>`
  ).join('');

function switchDocTab(idx) {
  activeDocTab = idx;
  renderDocTabs();
  renderDocContent(idx);
}

function renderDocContent(idx) {
  const el = document.getElementById('doc-content');
  const code = DOC_CODES[idx];
  el.innerHTML = `
    <div>
      <h3 class="doc-heading">${t('docH'+idx)}</h3>
      <p class="doc-text">${t('docP'+idx+'a')}</p>
      <p class="doc-text">${t('docP'+idx+'b')}</p>
    </div>
    <div class="code-block">
      <div class="code-head">
        <span class="code-lang">terminal</span>
        <button class="copy-btn" id="copy-btn-${idx}" onclick="copyCode(this, ${JSON.stringify(code)})">
          <i class="fa-regular fa-copy"></i> ${t('copyBtn')}
        </button>
      </div>
      <div class="code-body">${escHtml(code)}</div>
    </div>`;
}

function copyCode(btn, text) {
  navigator.clipboard && navigator.clipboard.writeText(text);
  btn.innerHTML = `<i class="fa-solid fa-check"></i> ${t('copiedBtn')}`;
  btn.classList.add('copied');
  setTimeout(() => {
    btn.innerHTML = `<i class="fa-regular fa-copy"></i> ${t('copyBtn')}`;
    btn.classList.remove('copied');
  }, 2000);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

const widgetStates = {};

function initWidget(containerId) {
  const st = makeState();
  st.logs = freshLogs();
  widgetStates[containerId] = st;
  renderWidget(containerId);
}

function renderWidget(id) {
  const st = widgetStates[id];
  const allAlive = st.nodes.every(n => n.alive);
  const statusColor = allAlive ? '#10b981' : '#f59e0b';
  const statusLabel = allAlive ? t('healthy') : t('degraded');

  // status
  const statusEl = document.getElementById(id+'-status');
  if (statusEl) statusEl.innerHTML = `
    <div style="width:6px;height:6px;border-radius:50%;background:${statusColor};box-shadow:0 0 8px ${statusColor}80;animation:pulse-glow 2s infinite"></div>
    <span style="color:${statusColor}">${statusLabel}</span>`;

  // nodes
  const nodesEl = document.getElementById(id+'-nodes');
  if (nodesEl) nodesEl.innerHTML = st.nodes.map(n => {
    let cls = 'node-card'; if (!n.alive) cls+=' dead'; else if (n.boosted) cls+=' boosted';
    const ico = n.alive
      ? '<i class="fa-brands fa-docker" style="color:'+(n.boosted?'#10b981':'#f97316')+'"></i>'
      : '<i class="fa-solid fa-xmark" style="color:#ef4444"></i>';
    const loadTxt = n.alive ? n.load+'% load' : t('offline');
    const badge = n.boosted ? `<div class="node-badge"><i class="fa-solid fa-arrow-up"></i>${t('rebalanced')}</div>` : '';
    return `<div class="${cls}"><div class="node-icon">${ico}</div><div class="node-lbl">Node ${n.id}</div><div class="node-load">${loadTxt}</div>${badge}</div>`;
  }).join('');

  // buttons
  const btnsEl = document.getElementById(id+'-btns');
  if (btnsEl) {
    const anyDead = st.nodes.some(n => !n.alive);
    btnsEl.innerHTML = st.nodes.map(n => `
      <button class="kill-btn" onclick="killNode('${id}',${n.id})" ${!n.alive?'disabled':''}>
        <i class="fa-solid fa-skull-crossbones"></i> ${t('killLabel',{n:n.id})}
      </button>`).join('') +
      `<button class="reset-btn" onclick="resetWidget('${id}')" ${!anyDead?'disabled':''}>
        <i class="fa-solid fa-arrows-rotate"></i> ${t('resetLabel')}
      </button>`;
  }

  // logs
  renderLogs(id);
}

function renderLogs(id) {
  const st = widgetStates[id];
  const logsEl = document.getElementById(id+'-logs');
  if (!logsEl) return;
  const colorMap = {info:'ll-info',ok:'ll-ok',warn:'ll-warn',err:'ll-err'};
  logsEl.innerHTML = st.logs.map(l =>
    `<div class="ll ${colorMap[l.type]||'ll-info'}">${escHtml(l.text)}</div>`
  ).join('') + `<div class="term-cursor">$ <span class="cursor-block"></span></div>`;
  logsEl.scrollTop = logsEl.scrollHeight;
}

function addLog(id, type, text) {
  const st = widgetStates[id];
  st.logs.push({type, text});
  if (st.logs.length > 12) st.logs.shift();
  renderLogs(id);
}

function killNode(id, nodeId) {
  const st = widgetStates[id];
  const node = st.nodes.find(n => n.id === nodeId);
  if (!node || !node.alive) return;
  const alive = st.nodes.filter(n => n.alive && n.id !== nodeId);
  if (!alive.length) return;
  const share = Math.floor(node.load / alive.length);
  const tasks = [...node.tasks];
  st.nodes = st.nodes.map(n => {
    if (n.id === nodeId) return {...n, alive:false, load:0, tasks:[]};
    if (alive.find(a => a.id === n.id)) {
      const grab = tasks.splice(0, Math.ceil(tasks.length / alive.length));
      return {...n, load:n.load+share, boosted:true, tasks:[...n.tasks,...grab]};
    }
    return n;
  });
  addLog(id,'warn', t('demoWarn',{n:nodeId}));
  addLog(id,'err',  t('demoCrit',{n:nodeId}));
  renderWidget(id);
  setTimeout(() => { addLog(id,'info', t('demoReb',{n:nodeId})); }, 600);
  setTimeout(() => {
    const targets = alive.map(n => n.id).join(' & ');
    addLog(id,'ok', t('demoOk',{t:targets}));
    st.nodes = st.nodes.map(n => ({...n, boosted:false}));
    renderWidget(id);
  }, 1500);
}

function resetWidget(id) {
  const st = widgetStates[id];
  addLog(id,'info', t('demoReset'));
  setTimeout(() => {
    const fresh = makeState();
    fresh.logs = freshLogs();
    widgetStates[id] = fresh;
    renderWidget(id);
  }, 400);
}

function renderWidgets() {
  // re-render all widgets (for language change)
  Object.keys(widgetStates).forEach(id => {
    const st = widgetStates[id];
    st.logs = freshLogs();
    renderWidget(id);
  });
}

document.addEventListener('DOMContentLoaded', () => {
  applyI18n();
  renderFeatures();
  renderHowSteps();
  renderDocTabs();
  renderDocContent(0);

  // mount hero widget
  const heroW = document.getElementById('hero-widget');
  heroW.innerHTML = buildWidget('w-hero');
  initWidget('w-hero');

  // mount full demo widget
  const fullW = document.getElementById('full-widget');
  fullW.innerHTML = buildWidget('w-full');
  initWidget('w-full');
});
</script>
